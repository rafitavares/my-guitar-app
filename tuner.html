<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Tuner & FFT</title>
    <style>
        :root {
            --bg-color: #f2f2f7;
            --box-bg: #ffffff;
            --text-color: #333333;
            --chord-color: #007AFF;
            --border-color: #cccccc;
        }
        body.dark-mode {
            --bg-color: #000000;
            --box-bg: #1c1c1e;
            --text-color: #ffffff;
            --chord-color: #0A84FF; 
            --border-color: #444444;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); text-align: center; }
        
        .header { background: var(--box-bg); padding: 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.1); }
        .back-btn { background: none; border: none; font-size: 16px; color: #FF3B30; font-weight: bold; cursor: pointer; }
        
        .tuner-container { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        
        .instrument-toggle { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .inst-btn { padding: 10px 15px; border-radius: 8px; border: 1px solid var(--border-color); background: var(--box-bg); color: var(--text-color); font-weight: bold; cursor: pointer; font-size: 14px; }
        .inst-btn.active { background: var(--chord-color); color: white; border-color: var(--chord-color); }
        .inst-btn.active-green { background: #32D74B; color: black; border-color: #32D74B; }

        .note-display { font-size: 110px; font-weight: bold; margin: 10px 0; color: var(--text-color); line-height: 1; transition: all 0.3s; }
        .cents-display { font-size: 18px; color: gray; margin-bottom: 10px; height: 24px; transition: all 0.3s; }
        
        /* Gráfico Canvas Dinâmico */
        .graph-container { width: 100%; max-width: 350px; height: 160px; background: var(--box-bg); border-radius: 12px; border: 1px solid var(--border-color); position: relative; overflow: hidden; margin-bottom: 5px; box-shadow: inset 0 2px 10px rgba(0,0,0,0.5); transition: height 0.3s ease; }
        canvas { width: 100%; height: 100%; display: block; }
        .target-line { position: absolute; top: 50%; left: 0; width: 100%; height: 2px; background: rgba(50, 215, 75, 0.7); z-index: 1; pointer-events: none; }
        
        .graph-labels { display: flex; justify-content: space-between; width: 100%; max-width: 350px; font-size: 12px; color: gray; margin-bottom: 20px; padding: 0 5px; box-sizing: border-box; }

        .btn-start { background-color: var(--chord-color); color: white; border: none; padding: 15px 30px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; max-width: 350px; margin-top: 10px; }
        .btn-start.active { background-color: #FF3B30; }
    </style>
</head>
<body class="dark-mode">

    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'">⬅️ Back</button>
        <h2 style="margin: 0; font-size: 20px;">🪕 Pro Tuner</h2>
        <div style="width: 60px;"></div>
    </div>

    <div class="tuner-container">
        
        <div class="instrument-toggle">
            <button id="btnPitch" class="inst-btn active-green" onclick="setViewMode('pitch')">Pitch Graph</button>
            <button id="btnFFT" class="inst-btn" onclick="setViewMode('fft')">Harmonics (FFT)</button>
        </div>
        <div class="instrument-toggle" style="margin-bottom: 10px;">
            <button id="btn440" class="inst-btn active" onclick="setBaseFrequency(440)">440 Hz</button>
            <button id="btn432" class="inst-btn" onclick="setBaseFrequency(432)">432 Hz</button>
        </div>

        <div class="note-display" id="note">--</div>
        <div class="cents-display" id="cents">Press Start to tune</div>
        
        <div class="graph-container" id="graphContainer">
            <div class="target-line" id="targetLine"></div>
            <canvas id="pitchGraph"></canvas>
        </div>
        <div class="graph-labels" id="graphLabels">
            <span id="labelLeft">Flat (-50¢)</span>
            <span id="labelCenter">Perfect</span>
            <span id="labelRight">Sharp (+50¢)</span>
        </div>

        <button id="startBtn" class="btn-start" onclick="toggleTuner()">Start Microphone</button>
    </div>

<script>
    let audioContext;
    let analyser;
    let microphone;
    let isTuning = false;
    let animationId;
    
    let baseA4 = 440; 
    let viewMode = 'pitch'; 

    const notes = ["C", "C#", "D", "D#", "E", "F", "F#", "G", "G#", "A", "A#", "B"];
    
    const canvas = document.getElementById('pitchGraph');
    const ctx = canvas.getContext('2d');
    
    const historySize = 100;
    let pitchHistory = new Array(historySize).fill(null);
    let frequencyArray; 

    function resizeCanvas() {
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function setBaseFrequency(freq) {
        baseA4 = freq;
        document.getElementById('btn440').classList.remove('active');
        document.getElementById('btn432').classList.remove('active');
        document.getElementById('btn' + freq).classList.add('active');
        if (isTuning) { document.getElementById('cents').innerText = "Ref: " + freq + " Hz"; }
    }

    function setViewMode(mode) {
        viewMode = mode;
        document.getElementById('btnPitch').classList.remove('active-green');
        document.getElementById('btnFFT').classList.remove('active-green');
        
        if (mode === 'pitch') {
            document.getElementById('btnPitch').classList.add('active-green');
            document.getElementById('targetLine').style.display = 'block';
            document.getElementById('labelLeft').innerText = "Flat (-50¢)";
            document.getElementById('labelCenter').innerText = "Perfect";
            document.getElementById('labelRight').innerText = "Sharp (+50¢)";
            
            document.getElementById('note').style.display = 'block';
            document.getElementById('cents').style.display = 'block';
            document.getElementById('graphContainer').style.height = '160px';
        } else {
            document.getElementById('btnFFT').classList.add('active-green');
            document.getElementById('targetLine').style.display = 'none'; 
            document.getElementById('labelLeft').innerText = "0 Hz";
            document.getElementById('labelCenter').innerText = "Frequency Spectrum";
            document.getElementById('labelRight').innerText = "~3000 Hz";
            
            document.getElementById('note').style.display = 'none';
            document.getElementById('cents').style.display = 'none';
            document.getElementById('graphContainer').style.height = '320px'; 
        }
        
        setTimeout(resizeCanvas, 310); 
        ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function autoCorrelate(buf, sampleRate) {
        let SIZE = buf.length;
        let rms = 0;
        for (let i = 0; i < SIZE; i++) { rms += buf[i] * buf[i]; }
        rms = Math.sqrt(rms / SIZE);
        if (rms < 0.01) return -1;

        let r1 = 0, r2 = SIZE - 1, thres = 0.2;
        for (let i = 0; i < SIZE / 2; i++) if (Math.abs(buf[i]) < thres) { r1 = i; break; }
        for (let i = 1; i < SIZE / 2; i++) if (Math.abs(buf[SIZE - i]) < thres) { r2 = SIZE - i; break; }

        buf = buf.slice(r1, r2);
        SIZE = buf.length;

        let c = new Array(SIZE).fill(0);
        for (let i = 0; i < SIZE; i++)
            for (let j = 0; j < SIZE - i; j++)
                c[i] = c[i] + buf[j] * buf[j + i];

        let d = 0; while (c[d] > c[d + 1]) d++;
        let maxval = -1, maxpos = -1;
        for (let i = d; i < SIZE; i++) {
            if (c[i] > maxval) { maxval = c[i]; maxpos = i; }
        }
        let T0 = maxpos;
        let x1 = c[T0 - 1], x2 = c[T0], x3 = c[T0 + 1];
        let a = (x1 + x3 - 2 * x2) / 2;
        let b = (x3 - x1) / 2;
        if (a) T0 = T0 - b / (2 * a);

        return sampleRate / T0;
    }

    function noteFromPitch(frequency) { return Math.round(12 * (Math.log(frequency / baseA4) / Math.log(2))) + 69; }
    function frequencyFromNoteNumber(note) { return baseA4 * Math.pow(2, (note - 69) / 12); }
    function centsOffFromPitch(frequency, note) { return Math.floor(1200 * Math.log(frequency / frequencyFromNoteNumber(note)) / Math.log(2)); }

    function drawGraph() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        let pr = window.devicePixelRatio; 
        
        if (viewMode === 'pitch') {
            ctx.lineWidth = 4 * pr;
            ctx.beginPath();
            let started = false;
            
            for (let i = 0; i < historySize; i++) {
                let cents = pitchHistory[i];
                if (cents !== null) {
                    let clampedCents = Math.max(-50, Math.min(50, cents));
                    let y = (canvas.height / 2) - (clampedCents * (canvas.height / 100));
                    let x = (i / (historySize - 1)) * canvas.width;
                    
                    if (Math.abs(clampedCents) < 5) ctx.strokeStyle = '#32D74B'; 
                    else if (clampedCents < 0) ctx.strokeStyle = '#0A84FF'; 
                    else ctx.strokeStyle = '#FF9500'; 

                    if (!started) { ctx.moveTo(x, y); started = true; } 
                    else { ctx.lineTo(x, y); }
                }
            }
            ctx.stroke();

        } else if (viewMode === 'fft' && analyser) {
            analyser.getByteFrequencyData(frequencyArray);
            
            const maxBins = 300; 
            const barWidth = canvas.width / maxBins;
            let peaks = [];
            
            // --- AUTO SCALE: Descobre o pico máximo atual na tela ---
            let maxAmpInFrame = 1; 
            for(let i = 0; i < maxBins; i++) {
                if(frequencyArray[i] > maxAmpInFrame) maxAmpInFrame = frequencyArray[i];
            }
            
            // Limita a altura máxima para 80% do canvas, abrindo espaço para os balões no topo!
            let scaleFactor = (canvas.height * 0.80) / maxAmpInFrame;

            // --- EIXO Y (AMPLITUDE) ---
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.font = `${10 * pr}px sans-serif`;
            ctx.textAlign = 'left';
            
            // Linha e Texto: 100% de Amplitude
            let y100 = canvas.height - (maxAmpInFrame * scaleFactor);
            ctx.fillText("Max Amp", 5 * pr, y100 - 5 * pr);
            ctx.beginPath(); ctx.moveTo(0, y100); ctx.lineTo(canvas.width, y100);
            ctx.setLineDash([5 * pr, 5 * pr]); ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.stroke(); ctx.setLineDash([]);
            
            // Linha e Texto: 50% de Amplitude
            let y50 = canvas.height - ((maxAmpInFrame / 2) * scaleFactor);
            ctx.fillText("50% Amp", 5 * pr, y50 - 5 * pr);
            ctx.beginPath(); ctx.moveTo(0, y50); ctx.lineTo(canvas.width, y50);
            ctx.setLineDash([5 * pr, 5 * pr]); ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; ctx.stroke(); ctx.setLineDash([]);

            // --- BARRAS DE FREQUÊNCIA ---
            for(let i = 0; i < maxBins; i++) {
                let amp = frequencyArray[i];
                let barHeight = amp * scaleFactor;
                let x = i * barWidth;
                let y = canvas.height - barHeight;
                
                ctx.fillStyle = `hsl(${220 + (i / maxBins) * 100}, 100%, 60%)`;
                ctx.fillRect(x, y, Math.max(1, barWidth - 0.5), barHeight);

                // Algoritmo para achar picos isolados
                if (i > 0 && i < maxBins - 1) {
                    if (amp > 50 && amp > frequencyArray[i-1] && amp > frequencyArray[i+1]) {
                        peaks.push({ index: i, amp: amp, x: x + barWidth/2, y: y });
                    }
                }
            }

            // Pega os 5 harmônicos mais fortes
            peaks.sort((a, b) => b.amp - a.amp);
            let topPeaks = peaks.slice(0, 5);
            let hzPerBin = audioContext.sampleRate / analyser.fftSize;

            // --- DESENHA AS ETIQUETAS NOS PICOS ---
            topPeaks.forEach(p => {
                let freq = Math.round(p.index * hzPerBin);
                let text = `${freq}`; // Apenas o número!
                
                // Posição flutuante segura (para não sair da tela)
                let labelY = p.y - 20 * pr;
                if (labelY < 15 * pr) labelY = 15 * pr; 

                // Fundo do Texto
                ctx.fillStyle = 'rgba(0,0,0,0.85)';
                let boxW = 35 * pr;
                let boxH = 18 * pr;
                ctx.roundRect ? ctx.roundRect(p.x - boxW/2, labelY - 14*pr, boxW, boxH, 4*pr) : ctx.fillRect(p.x - boxW/2, labelY - 14*pr, boxW, boxH);
                ctx.fill();
                
                // O Número
                ctx.fillStyle = '#32D74B'; 
                ctx.font = `bold ${11 * pr}px sans-serif`;
                ctx.textAlign = 'center';
                ctx.fillText(text, p.x, labelY - 1*pr);
                
                // Bolinha no pico
                ctx.beginPath();
                ctx.arc(p.x, p.y, 3 * pr, 0, 2 * Math.PI);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
            });
        }
    }

    async function toggleTuner() {
        const btn = document.getElementById('startBtn');
        
        if (isTuning) {
            isTuning = false;
            cancelAnimationFrame(animationId);
            if(audioContext) audioContext.close();
            btn.innerText = "Start Microphone";
            btn.classList.remove('active');
            document.getElementById('note').innerText = "--";
            document.getElementById('cents').innerText = "Paused";
            pitchHistory.fill(null);
            drawGraph();
            return;
        }

        try {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 4096; 
            frequencyArray = new Uint8Array(analyser.frequencyBinCount);
            
            microphone = audioContext.createMediaStreamSource(stream);
            microphone.connect(analyser);
            
            isTuning = true;
            btn.innerText = "Stop Tuner";
            btn.classList.add('active');
            updatePitch();
        } catch (err) {
            alert("Microphone access denied. Please allow it in settings.");
            console.error(err);
        }
    }

    function updatePitch() {
        if (!isTuning) return;

        let buffer = new Float32Array(analyser.fftSize);
        analyser.getFloatTimeDomainData(buffer);
        let ac = autoCorrelate(buffer, audioContext.sampleRate);

        if (ac !== -1) {
            let pitch = ac;
            let note = noteFromPitch(pitch);
            let noteName = notes[note % 12];
            let cents = centsOffFromPitch(pitch, note);

            pitchHistory.push(cents);
            pitchHistory.shift(); 

            if (viewMode === 'pitch') {
                document.getElementById('note').innerText = noteName;
                if (Math.abs(cents) < 5) {
                    document.getElementById('note').style.color = "#32D74B"; 
                    document.getElementById('cents').innerText = `Perfect! (${Math.round(pitch)} Hz)`;
                } else {
                    document.getElementById('note').style.color = "var(--text-color)";
                    if(cents < 0) {
                        document.getElementById('cents').innerText = `Too Flat • Tighten string`;
                    } else {
                        document.getElementById('cents').innerText = `Too Sharp • Loosen string`;
                    }
                }
            }
        } else {
            pitchHistory.push(null);
            pitchHistory.shift();
        }

        drawGraph();
        animationId = requestAnimationFrame(updatePitch);
    }
</script>
</body>
</html>
