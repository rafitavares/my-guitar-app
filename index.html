<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="manifest" href="manifest.json">

    <title>Chord Finder</title>
    
    <style>
        :root {
            --bg-color: #f2f2f7;
            --box-bg: #ffffff;
            --text-color: #333333;
            --chord-color: #007AFF;
            --chord-box-bg: #e5e5ea;
            --border-color: #cccccc;
        }

        body.dark-mode {
            --bg-color: #000000;
            --box-bg: #1c1c1e;
            --text-color: #ffffff;
            --chord-color: #32D74B; 
            --chord-box-bg: #1c1c1e;
            --border-color: #444444;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s; }
        
        .header { background: var(--box-bg); padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-size: 22px; }
        .header-buttons { display: flex; gap: 10px; }
        .icon-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; color: var(--text-color); }

        .app-container { padding: 20px; padding-bottom: 100px; }
        
        #searchSection, #addSongSection { background: var(--box-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; }
        textarea { font-family: monospace; resize: vertical; }
        .btn-primary { width: 100%; background-color: #007AFF; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        #liveSearchResults { background: var(--box-bg); border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); display: none; margin-bottom: 20px; }

        .playlist-group { background: var(--box-bg); border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .playlist-title { background: var(--chord-box-bg); padding: 10px 15px; margin: 0; font-size: 16px; font-weight: bold; color: var(--chord-color); display: flex; justify-content: space-between; align-items: center; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--bg-color); font-size: 15px; }
        .song-info { flex-grow: 1; cursor: pointer; }
        .delete-btn { background: none; border: none; color: #FF3B30; font-size: 18px; cursor: pointer; padding: 5px 0 5px 15px; }

        #resultArea { display: none; background: var(--bg-color); min-height: 100vh; padding: 30px 20px 120px 20px; box-sizing: border-box; }
        .controls-row { display: flex; gap: 8px; margin-top: 15px; margin-bottom: 15px; }
        
        .toolbar { display: flex; justify-content: space-around; background: var(--chord-box-bg); padding: 10px; border-radius: 8px; margin-bottom: 10px; align-items: center; }
        .toolbar-btn { background: none; border: none; color: var(--text-color); font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .chord-box { background: var(--box-bg); padding: 20px; border-radius: 12px; font-size: 16px; line-height: 1.4; transition: font-size 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .song-line { display: flex; flex-wrap: wrap; margin-bottom: 10px; }
        .chord-pair { display: inline-flex; flex-direction: column; justify-content: flex-end; }
        .chord { color: var(--chord-color); font-weight: bold; font-size: 0.9em; min-height: 1em; margin-bottom: 2px; font-family: sans-serif; transition: color 0.3s; }
        .lyric { white-space: pre-wrap; font-family: sans-serif; }

        .scroll-controls { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; border-radius: 40px; display: none; align-items: center; gap: 15px; padding: 12px 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 1000; }
        .scroll-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 5px; }
        .speed-label { font-size: 16px; font-weight: bold; width: 50px; text-align: center; font-family: sans-serif;}
        .play-btn { color: #FF9500; font-size: 28px; margin-left: 10px; }

        /* NOVA JANELA MODAL PARA PLAYLISTS */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .modal-content { background: var(--box-bg); padding: 20px; border-radius: 12px; width: 90%; max-width: 400px; box-shadow: 0 4px 20px rgba(0,0,0,0.2); max-height: 80vh; overflow-y: auto; }
        .playlist-btn { width: 100%; text-align: left; padding: 14px; margin-bottom: 10px; background: var(--chord-box-bg); border: none; border-radius: 8px; font-size: 16px; color: var(--text-color); cursor: pointer; font-weight: bold; }
        .playlist-btn:hover { background: #d1d1d6; }
        body.dark-mode .playlist-btn:hover { background: #2c2c2e; }
    </style>
</head>
<body>

<div id="mainInterface">
    <div class="header">
        <h2>🎸 Chords</h2>
        <div class="header-buttons">
            <button class="icon-btn" onclick="window.location.href='tuner.html'" style="font-size: 16px; font-weight: bold;">🪕 Tuner</button>
            
            <button class="icon-btn" onclick="toggleAddSong()">➕</button>
            <button class="icon-btn" onclick="toggleSearch()">🔍</button>
        </div>
    </div>

    <div class="app-container">
        
        <div id="searchSection">
            <input type="text" id="searchInput" placeholder="Type song or artist..." oninput="liveSearch()">
        </div>

        <div id="liveSearchResults"></div>

        <div id="addSongSection">
            <h3 style="margin-top: 0;">Add New Song</h3>
            <input type="text" id="newTitle" placeholder="Song Title">
            <input type="text" id="newArtist" placeholder="Artist">
            <textarea id="newChords" rows="8" placeholder="Paste chords and lyrics here..."></textarea>
            <button class="btn-primary" style="background-color: #34C759;" onclick="saveCustomSong()">💾 Save Song</button>
            <button class="btn-primary" style="background-color: #FF3B30; margin-top: 10px;" onclick="toggleAddSong()">Cancel</button>
        </div>

        <div id="playlistsArea"></div>
    </div>
</div>

<div id="resultArea">
    <h2 id="songTitle" style="margin-top: 0; font-size: 28px;"></h2>
    <p id="songArtist" style="color: gray; margin: 0; font-size: 18px;"></p>
    
    <div class="controls-row">
        <button class="btn-primary" id="btnBack" style="background-color: #FF3B30; flex: 1;" onclick="closeSong()">⬅️ Back</button>
        <button class="btn-primary" id="btnPrevShow" style="background-color: #FF9500; flex: 1; display: none;" onclick="prevShowSong()">⏮️ Prev</button>
        <button class="btn-primary" id="btnNextShow" style="background-color: #FF9500; flex: 1; display: none;" onclick="nextShowSong()">Next ⏭️</button>
        <button class="btn-primary" id="btnAddPlaylist" style="background-color: #007AFF; flex: 1;" onclick="openPlaylistModal()">➕ Playlist</button>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn" onclick="changeTranspose(-1)">⬇️ -½</button>
        <span id="transposeLabel" style="font-weight: bold; color: var(--chord-color);">Key: 0</span>
        <button class="toolbar-btn" onclick="changeTranspose(1)">⬆️ +½</button>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn" onclick="toggleDarkMode()">🌓 Dark</button>
        <div style="width: 1px; height: 20px; background: var(--border-color);"></div>
        <button class="toolbar-btn" onclick="changeFontSize(-2)">A-</button>
        <span style="font-weight: bold; color: gray;">Text</span>
        <button class="toolbar-btn" onclick="changeFontSize(2)">A+</button>
    </div>

    <div id="songChords" class="chord-box"></div>
</div>

<div id="scrollControls" class="scroll-controls">
    <button class="scroll-btn" onclick="changeSpeed(1)">➖</button>
    <span id="speedLabel" class="speed-label">Spd 3</span>
    <button class="scroll-btn" onclick="changeSpeed(-1)">➕</button>
    <button id="autoscrollBtn" class="scroll-btn play-btn" onclick="toggleAutoscroll()">▶️</button>
</div>

<div id="playlistModal" class="modal-overlay" style="display:none;">
    <div class="modal-content">
        <h3 style="margin-top: 0;">Save to Playlist</h3>
        <p style="color: gray; font-size: 14px; margin-bottom: 15px;">Choose an existing playlist or create a new one.</p>
        
        <div id="existingPlaylistsList"></div>
        
        <hr style="border: none; border-top: 1px solid var(--border-color); margin: 15px 0;">
        
        <input type="text" id="newPlaylistName" placeholder="Create new playlist name...">
        <button class="btn-primary" style="background-color: #34C759;" onclick="createNewPlaylist()">Create & Save</button>
        <button class="btn-primary" style="background-color: transparent; color: #FF3B30; border: 1px solid #FF3B30; margin-top:10px;" onclick="closePlaylistModal()">Cancel</button>
    </div>
</div>

<script>
    let songDatabase = []; 
    let currentSong = null;
    let isScrolling = false;
    let scrollInterval = null;
    const speedsArray = [120, 80, 50, 30, 15]; 
    let currentSpeedIndex = 2; 
    let currentFontSize = 16; 
    let currentTranspose = 0;
    const musicalNotes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    let savedTranspositions = JSON.parse(localStorage.getItem('savedTranspositions')) || {};
    let isShowMode = false;
    let currentShowList = [];
    let currentShowIndex = 0;

    // NOVAS VARIÁVEIS GLOBAIS PARA ACESSO AOS DADOS DAS LISTAS
    let globalCategories = {};
    let globalCustomSongs = [];

    async function loadSongs() {
        try {
            const response = await fetch('songs.json');
            const jsonSongs = await response.json();
            const customSongs = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
            songDatabase = [...jsonSongs, ...customSongs]; 
        } catch (error) {
            console.error("Error loading songs:", error);
            songDatabase = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
        }
        displayLibrary();
    }

    window.onload = () => { loadSongs(); };

    function toggleSearch() {
        document.getElementById("addSongSection").style.display = "none";
        const searchDiv = document.getElementById("searchSection");
        searchDiv.style.display = searchDiv.style.display === "none" ? "block" : "none";
        if(searchDiv.style.display === "block") document.getElementById("searchInput").focus();
    }

    function toggleAddSong() {
        document.getElementById("searchSection").style.display = "none";
        document.getElementById("liveSearchResults").style.display = "none";
        document.getElementById("playlistsArea").style.display = "block";
        const addDiv = document.getElementById("addSongSection");
        addDiv.style.display = addDiv.style.display === "none" ? "block" : "none";
    }

    function normalizeString(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase();
    }

    function liveSearch() {
        const query = normalizeString(document.getElementById("searchInput").value);
        const resultsDiv = document.getElementById("liveSearchResults");
        const libraryDiv = document.getElementById("playlistsArea");

        if (query.length === 0) {
            resultsDiv.style.display = "none";
            libraryDiv.style.display = "block";
            return;
        }

        const results = songDatabase.filter(song => 
            normalizeString(song.title).includes(query) || 
            normalizeString(song.artist).includes(query)
        );

        resultsDiv.innerHTML = "";
        if (results.length > 0) {
            results.forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                const safeSong = JSON.stringify(song).replace(/'/g, "&#39;");
                songDiv.innerHTML = `<div class="song-info" onclick='openSongOnScreen(${safeSong})'><strong>${song.title}</strong><br><small style="color:gray;">${song.artist}</small></div>`;
                resultsDiv.appendChild(songDiv);
            });
            resultsDiv.style.display = "block";
            libraryDiv.style.display = "none"; 
        } else {
            resultsDiv.innerHTML = "<p style='padding: 15px; text-align: center; color: gray;'>No songs found.</p>";
            resultsDiv.style.display = "block";
            libraryDiv.style.display = "none";
        }
    }

    function autoFormatChords(rawText) {
        let lines = rawText.split('\n');
        let result = [];
        let i = 0;
        
        while (i < lines.length) {
            let line = lines[i];
            let tokens = line.trim().split(/\s+/);
            let chordRegex = /^[A-G][#b]?(m|maj|dim|aug|sus|add)?\d*(\/[A-G][#b]?)?$/i;
            let chordCount = tokens.filter(t => chordRegex.test(t)).length;
            let isChordLine = tokens.length > 0 && (chordCount / tokens.length) >= 0.5;

            if (isChordLine && i + 1 < lines.length && lines[i+1].trim() !== '') {
                let lyricLine = lines[i+1];
                let chordMatches = [...line.matchAll(/\S+/g)];
                let paddedLyric = lyricLine.padEnd(line.length, ' ');
                let offset = 0;
                let mergedLyric = paddedLyric;

                for (let match of chordMatches) {
                    let chord = match[0];
                    let pos = match.index;
                    mergedLyric = mergedLyric.slice(0, pos + offset) + '[' + chord + ']' + mergedLyric.slice(pos + offset);
                    offset += chord.length + 2;
                }
                result.push(mergedLyric.trim());
                i += 2; 
            } else {
                result.push(line);
                i++;
            }
        }
        return result.join('\n');
    }

    function saveCustomSong() {
        const title = document.getElementById("newTitle").value.trim();
        const artist = document.getElementById("newArtist").value.trim();
        const rawChords = document.getElementById("newChords").value;

        if (!title || !rawChords) {
            alert("Please enter a title and paste the chords!");
            return;
        }

        const formattedChords = autoFormatChords(rawChords);
        const newSong = { title, artist, chords: formattedChords };

        let customSongs = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
        customSongs.push(newSong);
        localStorage.setItem("myCustomSongs", JSON.stringify(customSongs));

        songDatabase.push(newSong);
        alert("Song saved successfully!");
        
        document.getElementById("newTitle").value = "";
        document.getElementById("newArtist").value = "";
        document.getElementById("newChords").value = "";
        toggleAddSong();
        
        displayLibrary(); 
        openSongOnScreen(newSong);
    }

    function transposeChordName(chord, steps) {
        if (steps === 0) return chord;
        return chord.replace(/[CDEFGAB][#b]?/g, function(match) {
            let note = match;
            if (note === 'Db') note = 'C#';
            if (note === 'Eb') note = 'D#';
            if (note === 'Gb') note = 'F#';
            if (note === 'Ab') note = 'G#';
            if (note === 'Bb') note = 'A#';

            let index = musicalNotes.indexOf(note);
            if (index === -1) return match; 

            let newIndex = (index + steps) % 12;
            if (newIndex < 0) newIndex += 12;
            return musicalNotes[newIndex];
        });
    }

    function changeTranspose(step) {
        currentTranspose += step;
        
        savedTranspositions[currentSong.title] = currentTranspose;
        localStorage.setItem('savedTranspositions', JSON.stringify(savedTranspositions));

        let labelText = currentTranspose === 0 ? "Key: 0" : (currentTranspose > 0 ? "Key: +" + currentTranspose : "Key: " + currentTranspose);
        document.getElementById("transposeLabel").innerText = labelText;
        if(currentSong) document.getElementById("songChords").innerHTML = formatChordsAndLyrics(currentSong.chords);
    }

    function formatChordsAndLyrics(text) {
        const lines = text.split('\n');
        let htmlResult = '';

        lines.forEach(line => {
            if (line.trim() === '') {
                htmlResult += '<br>'; 
                return;
            }

            let formattedLine = '';
            let parts = line.split('[');
            if (parts[0]) formattedLine += `<span class="chord-pair"><span class="chord"></span><span class="lyric">${parts[0]}</span></span>`;
            
            for (let i = 1; i < parts.length; i++) {
                let chordAndLyric = parts[i].split(']');
                let originalChordName = chordAndLyric[0];
                let lyricText = chordAndLyric[1] || ''; 
                let finalChordName = transposeChordName(originalChordName, currentTranspose);
                formattedLine += `<span class="chord-pair"><span class="chord">${finalChordName}</span><span class="lyric">${lyricText}</span></span>`;
            }
            htmlResult += `<div class="song-line">${formattedLine}</div>`;
        });
        return htmlResult;
    }

    function openSongOnScreen(song) {
        currentSong = song;
        
        currentTranspose = savedTranspositions[song.title] || 0; 
        
        let labelText = currentTranspose === 0 ? "Key: 0" : (currentTranspose > 0 ? "Key: +" + currentTranspose : "Key: " + currentTranspose);
        document.getElementById("transposeLabel").innerText = labelText;
        
        document.getElementById("songTitle").innerText = song.title;
        document.getElementById("songArtist").innerText = song.artist;
        document.getElementById("songChords").innerHTML = formatChordsAndLyrics(song.chords);
        
        if (isShowMode) {
            document.getElementById("btnAddPlaylist").style.display = "none";
            document.getElementById("btnPrevShow").style.display = currentShowIndex > 0 ? "block" : "none";
            document.getElementById("btnNextShow").style.display = "block";
            
            if (currentShowIndex === currentShowList.length - 1) {
                document.getElementById("btnNextShow").innerText = "End Show ⏹️";
            } else {
                document.getElementById("btnNextShow").innerText = "Next ⏭️";
            }
        } else {
            document.getElementById("btnAddPlaylist").style.display = "block";
            document.getElementById("btnPrevShow").style.display = "none";
            document.getElementById("btnNextShow").style.display = "none";
        }

        document.getElementById("mainInterface").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("scrollControls").style.display = "flex";
        
        document.getElementById("searchInput").value = "";
        document.getElementById("liveSearchResults").style.display = "none";
        document.getElementById("playlistsArea").style.display = "block";

        window.scrollTo(0, 0); 
    }

    function closeSong() {
        stopAutoscroll();
        currentSong = null;
        isShowMode = false; 
        document.getElementById("resultArea").style.display = "none";
        document.getElementById("scrollControls").style.display = "none";
        document.getElementById("mainInterface").style.display = "block";
        window.scrollTo(0, 0);
    }

    // --- NOVA FUNÇÃO QUE CONTROLA O MODO SHOW PARA QUALQUER LISTA ---
    function startShow(type, name) {
        if (type === 'playlist') {
            let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
            currentShowList = allPlaylists[name];
        } else if (type === 'category') {
            currentShowList = globalCategories[name];
        } else if (type === 'custom') {
            currentShowList = globalCustomSongs;
        }
        
        if (!currentShowList || currentShowList.length === 0) {
            alert("This list is empty!");
            return;
        }
        
        isShowMode = true;
        currentShowIndex = 0;
        openSongOnScreen(currentShowList[0]);
    }

    function nextShowSong() {
        if (currentShowIndex < currentShowList.length - 1) {
            currentShowIndex++;
            openSongOnScreen(currentShowList[currentShowIndex]);
        } else {
            alert("End of the Show! Great job! 🎸🔥");
            closeSong();
        }
    }

    function prevShowSong() {
        if (currentShowIndex > 0) {
            currentShowIndex--;
            openSongOnScreen(currentShowList[currentShowIndex]);
        }
    }

    // --- FUNÇÕES DA NOVA JANELA MODAL DE PLAYLIST ---
    function openPlaylistModal() {
        if (!currentSong) return;
        
        const listDiv = document.getElementById("existingPlaylistsList");
        listDiv.innerHTML = ""; // Limpa a lista
        
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        const playlistNames = Object.keys(allPlaylists);
        
        if (playlistNames.length === 0) {
            listDiv.innerHTML = "<p style='font-size: 14px; color: gray;'>No playlists yet. Create your first one below!</p>";
        } else {
            playlistNames.forEach(name => {
                const btn = document.createElement("button");
                btn.className = "playlist-btn";
                btn.innerHTML = `📁 ${name}`;
                btn.onclick = () => addToSpecificPlaylist(name);
                listDiv.appendChild(btn);
            });
        }
        
        document.getElementById("newPlaylistName").value = "";
        document.getElementById("playlistModal").style.display = "flex";
    }

    function closePlaylistModal() {
        document.getElementById("playlistModal").style.display = "none";
    }

    function createNewPlaylist() {
        const newName = document.getElementById("newPlaylistName").value.trim();
        if (!newName) {
            alert("Please enter a name for the new playlist.");
            return;
        }
        addToSpecificPlaylist(newName);
    }

    function addToSpecificPlaylist(playlistName) {
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        
        if (!allPlaylists[playlistName]) {
            allPlaylists[playlistName] = [];
        }
        
        if (!allPlaylists[playlistName].some(song => song.title === currentSong.title)) {
            allPlaylists[playlistName].push(currentSong);
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            alert("Saved to " + playlistName + "!"); 
            closePlaylistModal();
            displayLibrary(); 
        } else { 
            alert("Already in this playlist!"); 
        }
    }
    // ------------------------------------------------

    function changeFontSize(step) {
        currentFontSize += step;
        if (currentFontSize < 12) currentFontSize = 12;
        if (currentFontSize > 36) currentFontSize = 36;
        document.getElementById("songChords").style.fontSize = currentFontSize + "px";
    }

    function toggleDarkMode() { document.body.classList.toggle("dark-mode"); }

    function changeSpeed(step) {
        currentSpeedIndex += step;
        if (currentSpeedIndex < 0) currentSpeedIndex = 0;
        if (currentSpeedIndex >= speedsArray.length) currentSpeedIndex = speedsArray.length - 1;
        document.getElementById("speedLabel").innerText = "Spd " + (5 - currentSpeedIndex);
        if (isScrolling) { stopAutoscroll(); startAutoscroll(); }
    }

    function toggleAutoscroll() { isScrolling ? stopAutoscroll() : startAutoscroll(); }
    function startAutoscroll() { isScrolling = true; document.getElementById("autoscrollBtn").innerText = "⏸️"; scrollInterval = setInterval(() => { window.scrollBy(0, 1); }, speedsArray[currentSpeedIndex]); }
    function stopAutoscroll() { isScrolling = false; document.getElementById("autoscrollBtn").innerText = "▶️"; clearInterval(scrollInterval); }

    function deleteSong(playlistName, songTitle) {
        if (confirm("Remove from list?")) {
            let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
            allPlaylists[playlistName] = allPlaylists[playlistName].filter(song => song.title !== songTitle);
            if (allPlaylists[playlistName].length === 0) delete allPlaylists[playlistName];
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            displayLibrary(); 
        }
    }

    function displayLibrary() {
        const playlistsArea = document.getElementById("playlistsArea");
        playlistsArea.innerHTML = "";
        
        // MOSTRA A ABA CUSTOM (Added by Me) COM BOTÃO START SHOW
        globalCustomSongs = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
        if (globalCustomSongs.length > 0) {
            const groupDiv = document.createElement("div");
            groupDiv.className = "playlist-group";
            groupDiv.innerHTML = `
                <div class="playlist-title" style="background:#34C759; color:white;">
                    <span>🎸 Added by Me</span>
                    <button class="btn-primary" style="width: auto; padding: 6px 12px; font-size: 14px; background-color: #ffffff; color: #34C759; margin-left: 10px;" onclick="startShow('custom', 'Added by Me')">▶️ Start Show</button>
                </div>`;
            globalCustomSongs.forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                const safeSong = JSON.stringify(song).replace(/'/g, "&#39;");
                songDiv.innerHTML = `<div class="song-info" onclick='openSongOnScreen(${safeSong})'><strong>${song.title}</strong><br><small style="color:gray;">${song.artist}</small></div>`;
                groupDiv.appendChild(songDiv);
            });
            playlistsArea.appendChild(groupDiv);
        }

        // MOSTRA AS PLAYLISTS DO USUÁRIO COM BOTÃO START SHOW
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        const playlistNames = Object.keys(allPlaylists);
        playlistNames.forEach(name => {
            const groupDiv = document.createElement("div");
            groupDiv.className = "playlist-group";
            groupDiv.innerHTML = `
                <div class="playlist-title">
                    <span>🎤 Setlist: ${name}</span>
                    <button class="btn-primary" style="width: auto; padding: 6px 12px; font-size: 14px; background-color: #FF9500; margin-left: 10px;" onclick="startShow('playlist', '${name}')">▶️ Start Show</button>
                </div>`;
                
            allPlaylists[name].forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                const safeSong = JSON.stringify(song).replace(/'/g, "&#39;");
                songDiv.innerHTML = `<div class="song-info" onclick='openSongOnScreen(${safeSong})'><strong>${song.title}</strong><br><small style="color:gray;">${song.artist}</small></div><button class="delete-btn" onclick="deleteSong('${name}', '${song.title}')">🗑️</button>`;
                groupDiv.appendChild(songDiv);
            });
            playlistsArea.appendChild(groupDiv);
        });

        // AGRUPA E MOSTRA AS CATEGORIAS COM BOTÃO START SHOW
        globalCategories = {};
        songDatabase.forEach(song => {
            if (song.category) {
                if (!globalCategories[song.category]) globalCategories[song.category] = [];
                if (!globalCategories[song.category].some(s => s.title === song.title)) {
                    globalCategories[song.category].push(song);
                }
            }
        });

        Object.keys(globalCategories).forEach(cat => {
            const groupDiv = document.createElement("div");
            groupDiv.className = "playlist-group";
            groupDiv.innerHTML = `
                <div class="playlist-title">
                    <span>📚 ${cat}</span>
                    <button class="btn-primary" style="width: auto; padding: 6px 12px; font-size: 14px; background-color: #007AFF; margin-left: 10px;" onclick="startShow('category', '${cat}')">▶️ Start Show</button>
                </div>`;
                
            globalCategories[cat].forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                const safeSong = JSON.stringify(song).replace(/'/g, "&#39;");
                songDiv.innerHTML = `<div class="song-info" onclick='openSongOnScreen(${safeSong})'><strong>${song.title}</strong><br><small style="color:gray;">${song.artist}</small></div>`;
                groupDiv.appendChild(songDiv);
            });
            playlistsArea.appendChild(groupDiv);
        });

        if (playlistsArea.innerHTML === "") {
            playlistsArea.innerHTML = "<p style='color: gray; text-align: center;'>Your library is empty.</p>";
        }
    }

</script>

</body>
</html>
