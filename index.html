<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="manifest" href="manifest.json">

    <title>Chord Finder</title>
    
    <style>
        /* Variáveis de cores para facilitar o Modo Escuro */
        :root {
            --bg-color: #f2f2f7;
            --box-bg: #ffffff;
            --text-color: #333333;
            --chord-color: #007AFF;
            --chord-box-bg: #e5e5ea;
            --border-color: #cccccc;
        }

        /* Cores do Modo Escuro */
        body.dark-mode {
            --bg-color: #000000;
            --box-bg: #1c1c1e;
            --text-color: #ffffff;
            --chord-color: #32D74B; /* Verde neon para destacar no escuro */
            --chord-box-bg: #1c1c1e;
            --border-color: #444444;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s; }
        
        .header { background: var(--box-bg); padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-size: 22px; }
        .icon-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; color: var(--text-color); }

        .app-container { padding: 20px; padding-bottom: 100px; }
        
        #searchSection { background: var(--box-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); }
        .btn-primary { width: 100%; background-color: #007AFF; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .playlist-group { background: var(--box-bg); border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .playlist-title { background: var(--chord-box-bg); padding: 10px 15px; margin: 0; font-size: 16px; font-weight: bold; color: var(--chord-color); }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--bg-color); font-size: 15px; }
        .song-info { flex-grow: 1; cursor: pointer; }
        .delete-btn { background: none; border: none; color: #FF3B30; font-size: 18px; cursor: pointer; padding: 5px 0 5px 15px; }

        /* Tela de Música */
        #resultArea { display: none; background: var(--bg-color); min-height: 100vh; padding: 30px 20px 120px 20px; box-sizing: border-box; }
        .controls-row { display: flex; gap: 10px; margin-top: 15px; margin-bottom: 15px; }
        
        /* Barra de ferramentas extra (Fonte e Tema) */
        .toolbar { display: flex; justify-content: space-around; background: var(--chord-box-bg); padding: 10px; border-radius: 8px; margin-bottom: 20px; align-items: center; }
        .toolbar-btn { background: none; border: none; color: var(--text-color); font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        /* --- A MÁGICA DA CIFRA EM CIMA DA LETRA --- */
        .chord-box { background: var(--box-bg); padding: 20px; border-radius: 12px; font-size: 16px; line-height: 1.4; transition: font-size 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .song-line { display: flex; flex-wrap: wrap; margin-bottom: 10px; }
        .chord-pair { display: inline-flex; flex-direction: column; justify-content: flex-end; }
        .chord { color: var(--chord-color); font-weight: bold; font-size: 0.9em; min-height: 1em; margin-bottom: 2px; font-family: sans-serif; }
        .lyric { white-space: pre-wrap; font-family: sans-serif; }
        /* ------------------------------------------- */

        .scroll-controls { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; border-radius: 40px; display: none; align-items: center; gap: 15px; padding: 12px 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 1000; }
        .scroll-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 5px; }
        .speed-label { font-size: 16px; font-weight: bold; width: 50px; text-align: center; font-family: sans-serif;}
        .play-btn { color: #FF9500; font-size: 28px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="mainInterface">
    <div class="header">
        <h2>🎸 Chords</h2>
        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    </div>

    <div class="app-container">
        <div id="searchSection">
            <input type="text" id="searchInput" placeholder="Nome da música...">
            <button class="btn-primary" onclick="searchSong()">Buscar Música</button>
        </div>

        <h3 style="margin-top: 0;">Minhas Playlists</h3>
        <div id="playlistsArea"></div>
    </div>
</div>

<div id="resultArea">
    <h2 id="songTitle" style="margin-top: 0; font-size: 28px;"></h2>
    <p id="songArtist" style="color: gray; margin: 0; font-size: 18px;"></p>
    
    <div class="controls-row">
        <button class="btn-primary" style="background-color: #FF3B30; flex: 1;" onclick="closeSong()">⬅️ Voltar</button>
        <button class="btn-primary" style="background-color: #007AFF; flex: 1;" onclick="saveToPlaylist()">➕ Playlist</button>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn" onclick="toggleDarkMode()">🌓 Modo Escuro</button>
        <div style="width: 1px; height: 20px; background: var(--border-color);"></div>
        <button class="toolbar-btn" onclick="changeFontSize(-2)">A-</button>
        <span style="font-weight: bold; color: gray;">Letra</span>
        <button class="toolbar-btn" onclick="changeFontSize(2)">A+</button>
    </div>

    <div id="songChords" class="chord-box"></div>
</div>

<div id="scrollControls" class="scroll-controls">
    <button class="scroll-btn" onclick="changeSpeed(1)">➖</button>
    <span id="speedLabel" class="speed-label">Vel 3</span>
    <button class="scroll-btn" onclick="changeSpeed(-1)">➕</button>
    <button id="autoscrollBtn" class="scroll-btn play-btn" onclick="toggleAutoscroll()">▶️</button>
</div>

<script>
    const songDatabase = [
        { title: "Wonderwall", artist: "Oasis", chords: "[Em]Today is [G]gonna be the day\nThat they're [D]gonna throw it back to [A7sus4]you\nBy [Em]now you should've [G]somehow\nRealized what you [D]gotta do\nI don't be[Em]lieve that any[G]body\nFeels the [D]way I do, about you [A7sus4]now" },
        { title: "Let It Be", artist: "The Beatles", chords: "When I [C]find myself in [G]times of trouble\n[Am]Mother Mary [F]comes to me\nSpeaking [C]words of wisdom, [G]let it be [F]  [C]" },
        { title: "Tempo Perdido", artist: "Legião Urbana", chords: "Todos os [C]dias quando a[Am]cordo\nNão tenho mais o [Bm]tempo que pas[Em]sou\nMas tenho [C]muito tempo\nTemos todo o [Am]tempo do mun[Bm]do [Em]" }
    ];

    let currentSong = null;
    let isScrolling = false;
    let scrollInterval = null;
    const speedsArray = [120, 80, 50, 30, 15]; 
    let currentSpeedIndex = 2; 
    let currentFontSize = 16; // Tamanho inicial da fonte

    function toggleSearch() {
        const searchDiv = document.getElementById("searchSection");
        searchDiv.style.display = (searchDiv.style.display === "none" || searchDiv.style.display === "") ? "block" : "none";
        if(searchDiv.style.display === "block") document.getElementById("searchInput").focus();
    }

    function searchSong() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const result = songDatabase.find(song => song.title.toLowerCase().includes(query) || song.artist.toLowerCase().includes(query));
        if (result) {
            openSongOnScreen(result);
            document.getElementById("searchSection").style.display = "none";
            document.getElementById("searchInput").value = ""; 
        } else {
            alert("Música não encontrada.");
        }
    }

    // A FUNÇÃO MÁGICA QUE COLOCA O ACORDE EM CIMA DA SÍLABA
    function formatChordsAndLyrics(text) {
        const lines = text.split('\n');
        let htmlResult = '';

        lines.forEach(line => {
            if (line.trim() === '') {
                htmlResult += '<br>'; // Pula linha se for espaço vazio
                return;
            }

            let formattedLine = '';
            // Separa a linha em pedaços usando o colchete aberto "["
            let parts = line.split('[');
            
            // Se tiver texto antes do primeiro acorde, coloca ele sem acorde em cima
            if (parts[0]) {
                formattedLine += `<span class="chord-pair"><span class="chord"></span><span class="lyric">${parts[0]}</span></span>`;
            }
            
            // Para cada acorde da linha, separa o acorde da letra usando o colchete fechado "]"
            for (let i = 1; i < parts.length; i++) {
                let chordAndLyric = parts[i].split(']');
                let chordName = chordAndLyric[0];
                let lyricText = chordAndLyric[1] || ''; // Se não tiver letra depois, fica vazio
                
                // Constrói a estrutura HTML: Acorde em cima, Letra embaixo
                formattedLine += `<span class="chord-pair"><span class="chord">${chordName}</span><span class="lyric">${lyricText}</span></span>`;
            }
            
            htmlResult += `<div class="song-line">${formattedLine}</div>`;
        });

        return htmlResult;
    }

    function openSongOnScreen(song) {
        currentSong = song;
        document.getElementById("songTitle").innerText = song.title;
        document.getElementById("songArtist").innerText = song.artist;
        
        // Aplica a formatação mágica aqui!
        document.getElementById("songChords").innerHTML = formatChordsAndLyrics(song.chords);
        
        document.getElementById("mainInterface").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("scrollControls").style.display = "flex";
        window.scrollTo(0, 0); 
    }

    function closeSong() {
        stopAutoscroll();
        currentSong = null;
        document.getElementById("resultArea").style.display = "none";
        document.getElementById("scrollControls").style.display = "none";
        document.getElementById("mainInterface").style.display = "block";
        window.scrollTo(0, 0);
    }

    // --- CONTROLES DE TAMANHO DA FONTE ---
    function changeFontSize(step) {
        currentFontSize += step;
        // Limita o tamanho (não muito pequeno, não gigantesco)
        if (currentFontSize < 12) currentFontSize = 12;
        if (currentFontSize > 36) currentFontSize = 36;
        
        document.getElementById("songChords").style.fontSize = currentFontSize + "px";
    }

    // --- MODO ESCURO ---
    function toggleDarkMode() {
        // Liga ou desliga a classe 'dark-mode' no corpo do aplicativo
        document.body.classList.toggle("dark-mode");
    }

    function changeSpeed(step) {
        currentSpeedIndex += step;
        if (currentSpeedIndex < 0) currentSpeedIndex = 0;
        if (currentSpeedIndex >= speedsArray.length) currentSpeedIndex = speedsArray.length - 1;
        document.getElementById("speedLabel").innerText = "Vel " + (5 - currentSpeedIndex);
        if (isScrolling) { stopAutoscroll(); startAutoscroll(); }
    }

    function toggleAutoscroll() { isScrolling ? stopAutoscroll() : startAutoscroll(); }
    function startAutoscroll() { isScrolling = true; document.getElementById("autoscrollBtn").innerText = "⏸️"; scrollInterval = setInterval(() => { window.scrollBy(0, 1); }, speedsArray[currentSpeedIndex]); }
    function stopAutoscroll() { isScrolling = false; document.getElementById("autoscrollBtn").innerText = "▶️"; clearInterval(scrollInterval); }

    function saveToPlaylist() {
        if (!currentSong) return;
        let playlistName = prompt("Digite o nome da Playlist:", "Favoritas");
        if (!playlistName) return; 
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        if (!allPlaylists[playlistName]) allPlaylists[playlistName] = [];
        if (!allPlaylists[playlistName].some(song => song.title === currentSong.title)) {
            allPlaylists[playlistName].push(currentSong);
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            alert("Salvo!"); displayPlaylists(); 
        } else { alert("Já está na playlist!"); }
    }

    function deleteSong(playlistName, songTitle) {
        if (confirm("Remover da playlist?")) {
            let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
            allPlaylists[playlistName] = allPlaylists[playlistName].filter(song => song.title !== songTitle);
            if (allPlaylists[playlistName].length === 0) delete allPlaylists[playlistName];
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            displayPlaylists(); 
        }
    }

    function displayPlaylists() {
        const playlistsArea = document.getElementById("playlistsArea");
        playlistsArea.innerHTML = "";
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        const playlistNames = Object.keys(allPlaylists);

        if (playlistNames.length === 0) { playlistsArea.innerHTML = "<p style='color: gray; text-align: center;'>Nenhuma música salva.</p>"; return; }

        playlistNames.forEach(name => {
            const groupDiv = document.createElement("div");
            groupDiv.className = "playlist-group";
            groupDiv.innerHTML = `<h4 class="playlist-title">📁 ${name}</h4>`;
            allPlaylists[name].forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                songDiv.innerHTML = `<div class="song-info" onclick='openSongOnScreen(${JSON.stringify(song)})'><strong>${song.title}</strong><br><small style="color:gray;">${song.artist}</small></div><button class="delete-btn" onclick="deleteSong('${name}', '${song.title}')">🗑️</button>`;
                groupDiv.appendChild(songDiv);
            });
            playlistsArea.appendChild(groupDiv);
        });
    }

    displayPlaylists();
</script>

</body>
</html>
