<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="manifest" href="manifest.json">

    <title>Chord Finder</title>
    
    <style>
        :root {
            --bg-color: #f2f2f7;
            --box-bg: #ffffff;
            --text-color: #333333;
            --chord-color: #007AFF;
            --chord-box-bg: #e5e5ea;
            --border-color: #cccccc;
        }

        body.dark-mode {
            --bg-color: #000000;
            --box-bg: #1c1c1e;
            --text-color: #ffffff;
            --chord-color: #32D74B; 
            --chord-box-bg: #1c1c1e;
            --border-color: #444444;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-color); transition: background-color 0.3s, color 0.3s; }
        
        .header { background: var(--box-bg); padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-size: 22px; }
        .header-buttons { display: flex; gap: 10px; }
        .icon-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; color: var(--text-color); }

        .app-container { padding: 20px; padding-bottom: 100px; }
        
        #searchSection, #addSongSection { background: var(--box-bg); padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-size: 16px; box-sizing: border-box; background: var(--bg-color); color: var(--text-color); font-family: sans-serif; }
        textarea { font-family: monospace; resize: vertical; }
        .btn-primary { width: 100%; background-color: #007AFF; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        .playlist-group { background: var(--box-bg); border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .playlist-title { background: var(--chord-box-bg); padding: 10px 15px; margin: 0; font-size: 16px; font-weight: bold; color: var(--chord-color); }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid var(--bg-color); font-size: 15px; }
        .song-info { flex-grow: 1; cursor: pointer; }
        .delete-btn { background: none; border: none; color: #FF3B30; font-size: 18px; cursor: pointer; padding: 5px 0 5px 15px; }

        #resultArea { display: none; background: var(--bg-color); min-height: 100vh; padding: 30px 20px 120px 20px; box-sizing: border-box; }
        .controls-row { display: flex; gap: 10px; margin-top: 15px; margin-bottom: 15px; }
        
        .toolbar { display: flex; justify-content: space-around; background: var(--chord-box-bg); padding: 10px; border-radius: 8px; margin-bottom: 10px; align-items: center; }
        .toolbar-btn { background: none; border: none; color: var(--text-color); font-weight: bold; font-size: 16px; cursor: pointer; display: flex; align-items: center; gap: 5px; }

        .chord-box { background: var(--box-bg); padding: 20px; border-radius: 12px; font-size: 16px; line-height: 1.4; transition: font-size 0.2s; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .song-line { display: flex; flex-wrap: wrap; margin-bottom: 10px; }
        .chord-pair { display: inline-flex; flex-direction: column; justify-content: flex-end; }
        .chord { color: var(--chord-color); font-weight: bold; font-size: 0.9em; min-height: 1em; margin-bottom: 2px; font-family: sans-serif; transition: color 0.3s; }
        .lyric { white-space: pre-wrap; font-family: sans-serif; }

        .scroll-controls { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; border-radius: 40px; display: none; align-items: center; gap: 15px; padding: 12px 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 1000; }
        .scroll-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 5px; }
        .speed-label { font-size: 16px; font-weight: bold; width: 50px; text-align: center; font-family: sans-serif;}
        .play-btn { color: #FF9500; font-size: 28px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="mainInterface">
    <div class="header">
        <h2>🎸 Chords</h2>
        <div class="header-buttons">
            <button class="icon-btn" onclick="toggleAddSong()">➕</button>
            <button class="icon-btn" onclick="toggleSearch()">🔍</button>
        </div>
    </div>

    <div class="app-container">
        
        <div id="searchSection">
            <input type="text" id="searchInput" placeholder="Search song name...">
            <button class="btn-primary" onclick="searchSong()">Search Song</button>
        </div>

        <div id="addSongSection">
            <h3 style="margin-top: 0;">Add New Song</h3>
            <input type="text" id="newTitle" placeholder="Song Title">
            <input type="text" id="newArtist" placeholder="Artist">
            <textarea id="newChords" rows="8" placeholder="Paste chords and lyrics here... (e.g. from Cifra Club)"></textarea>
            <button class="btn-primary" style="background-color: #34C759;" onclick="saveCustomSong()">💾 Save Song</button>
            <button class="btn-primary" style="background-color: #FF3B30; margin-top: 10px;" onclick="toggleAddSong()">Cancel</button>
        </div>

        <h3 style="margin-top: 0;">My Library & Playlists</h3>
        <div id="playlistsArea"></div>
    </div>
</div>

<div id="resultArea">
    <h2 id="songTitle" style="margin-top: 0; font-size: 28px;"></h2>
    <p id="songArtist" style="color: gray; margin: 0; font-size: 18px;"></p>
    
    <div class="controls-row">
        <button class="btn-primary" style="background-color: #FF3B30; flex: 1;" onclick="closeSong()">⬅️ Back</button>
        <button class="btn-primary" style="background-color: #007AFF; flex: 1;" onclick="saveToPlaylist()">➕ Playlist</button>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn" onclick="changeTranspose(-1)">⬇️ -½</button>
        <span id="transposeLabel" style="font-weight: bold; color: var(--chord-color);">Key: 0</span>
        <button class="toolbar-btn" onclick="changeTranspose(1)">⬆️ +½</button>
    </div>

    <div class="toolbar">
        <button class="toolbar-btn" onclick="toggleDarkMode()">🌓 Dark Mode</button>
        <div style="width: 1px; height: 20px; background: var(--border-color);"></div>
        <button class="toolbar-btn" onclick="changeFontSize(-2)">A-</button>
        <span style="font-weight: bold; color: gray;">Text</span>
        <button class="toolbar-btn" onclick="changeFontSize(2)">A+</button>
    </div>

    <div id="songChords" class="chord-box"></div>
</div>

<div id="scrollControls" class="scroll-controls">
    <button class="scroll-btn" onclick="changeSpeed(1)">➖</button>
    <span id="speedLabel" class="speed-label">Spd 3</span>
    <button class="scroll-btn" onclick="changeSpeed(-1)">➕</button>
    <button id="autoscrollBtn" class="scroll-btn play-btn" onclick="toggleAutoscroll()">▶️</button>
</div>

<script>
    let songDatabase = []; 
    let currentSong = null;
    let isScrolling = false;
    let scrollInterval = null;
    const speedsArray = [120, 80, 50, 30, 15]; 
    let currentSpeedIndex = 2; 
    let currentFontSize = 16; 
    let currentTranspose = 0;
    const musicalNotes = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'B'];

    // CARREGA AS MÚSICAS DO JSON E AS MÚSICAS CRIADAS PELO USUÁRIO
    async function loadSongs() {
        try {
            const response = await fetch('songs.json');
            const jsonSongs = await response.json();
            
            const customSongs = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
            songDatabase = [...jsonSongs, ...customSongs]; // Junta as duas listas
        } catch (error) {
            console.error("Error loading songs:", error);
            songDatabase = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
        }
    }

    window.onload = () => {
        loadSongs();
        displayPlaylists();
    };

    function toggleSearch() {
        document.getElementById("addSongSection").style.display = "none";
        const searchDiv = document.getElementById("searchSection");
        searchDiv.style.display = searchDiv.style.display === "none" ? "block" : "none";
    }

    function toggleAddSong() {
        document.getElementById("searchSection").style.display = "none";
        const addDiv = document.getElementById("addSongSection");
        addDiv.style.display = addDiv.style.display === "none" ? "block" : "none";
    }

    function searchSong() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const result = songDatabase.find(song => song.title.toLowerCase().includes(query) || song.artist.toLowerCase().includes(query));
        if (result) {
            openSongOnScreen(result);
            document.getElementById("searchSection").style.display = "none";
            document.getElementById("searchInput").value = ""; 
        } else {
            alert("Song not found in your library.");
        }
    }

    // --- O ROBÔ CONVERSOR (CIFRA CLUB PARA O SEU APP) ---
    function autoFormatChords(rawText) {
        let lines = rawText.split('\n');
        let result = [];
        let i = 0;
        
        while (i < lines.length) {
            let line = lines[i];
            
            // Verifica se a linha é composta majoritariamente por acordes
            let tokens = line.trim().split(/\s+/);
            let chordRegex = /^[A-G][#b]?(m|maj|dim|aug|sus|add)?\d*(\/[A-G][#b]?)?$/i;
            let chordCount = tokens.filter(t => chordRegex.test(t)).length;
            
            // Se mais de 50% das palavras na linha forem acordes, é uma "linha de acorde"
            let isChordLine = tokens.length > 0 && (chordCount / tokens.length) >= 0.5;

            if (isChordLine && i + 1 < lines.length && lines[i+1].trim() !== '') {
                // Junta o acorde com a letra na linha de baixo
                let lyricLine = lines[i+1];
                let chordMatches = [...line.matchAll(/\S+/g)];
                let paddedLyric = lyricLine.padEnd(line.length, ' ');
                let offset = 0;
                let mergedLyric = paddedLyric;

                for (let match of chordMatches) {
                    let chord = match[0];
                    let pos = match.index;
                    mergedLyric = mergedLyric.slice(0, pos + offset) + '[' + chord + ']' + mergedLyric.slice(pos + offset);
                    offset += chord.length + 2;
                }
                result.push(mergedLyric.trim());
                i += 2; // Pula a linha da letra já que juntamos as duas
            } else {
                result.push(line);
                i++;
            }
        }
        return result.join('\n');
    }

    // SALVAR NOVA MÚSICA
    function saveCustomSong() {
        const title = document.getElementById("newTitle").value.trim();
        const artist = document.getElementById("newArtist").value.trim();
        const rawChords = document.getElementById("newChords").value;

        if (!title || !rawChords) {
            alert("Please enter a title and paste the chords!");
            return;
        }

        // Passa o texto pelo robô conversor
        const formattedChords = autoFormatChords(rawChords);

        const newSong = { title, artist, chords: formattedChords };

        // Salva na memória do celular
        let customSongs = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
        customSongs.push(newSong);
        localStorage.setItem("myCustomSongs", JSON.stringify(customSongs));

        // Adiciona na memória do aplicativo na mesma hora
        songDatabase.push(newSong);

        alert("Song saved successfully!");
        
        // Limpa a tela
        document.getElementById("newTitle").value = "";
        document.getElementById("newArtist").value = "";
        document.getElementById("newChords").value = "";
        toggleAddSong();
        
        // Abre a música para você ver como ficou
        openSongOnScreen(newSong);
    }
    // ----------------------------------------------------

    function transposeChordName(chord, steps) {
        if (steps === 0) return chord;
        return chord.replace(/[CDEFGAB][#b]?/g, function(match) {
            let note = match;
            if (note === 'Db') note = 'C#';
            if (note === 'Eb') note = 'D#';
            if (note === 'Gb') note = 'F#';
            if (note === 'Ab') note = 'G#';
            if (note === 'Bb') note = 'A#';

            let index = musicalNotes.indexOf(note);
            if (index === -1) return match; 

            let newIndex = (index + steps) % 12;
            if (newIndex < 0) newIndex += 12;
            return musicalNotes[newIndex];
        });
    }

    function changeTranspose(step) {
        currentTranspose += step;
        let labelText = currentTranspose === 0 ? "Key: 0" : (currentTranspose > 0 ? "Key: +" + currentTranspose : "Key: " + currentTranspose);
        document.getElementById("transposeLabel").innerText = labelText;
        
        if(currentSong) {
            document.getElementById("songChords").innerHTML = formatChordsAndLyrics(currentSong.chords);
        }
    }

    function formatChordsAndLyrics(text) {
        const lines = text.split('\n');
        let htmlResult = '';

        lines.forEach(line => {
            if (line.trim() === '') {
                htmlResult += '<br>'; 
                return;
            }

            let formattedLine = '';
            let parts = line.split('[');
            
            if (parts[0]) {
                formattedLine += `<span class="chord-pair"><span class="chord"></span><span class="lyric">${parts[0]}</span></span>`;
            }
            
            for (let i = 1; i < parts.length; i++) {
                let chordAndLyric = parts[i].split(']');
                let originalChordName = chordAndLyric[0];
                let lyricText = chordAndLyric[1] || ''; 
                
                let finalChordName = transposeChordName(originalChordName, currentTranspose);
                formattedLine += `<span class="chord-pair"><span class="chord">${finalChordName}</span><span class="lyric">${lyricText}</span></span>`;
            }
            
            htmlResult += `<div class="song-line">${formattedLine}</div>`;
        });

        return htmlResult;
    }

    function openSongOnScreen(song) {
        currentSong = song;
        currentTranspose = 0; 
        document.getElementById("transposeLabel").innerText = "Key: 0";
        document.getElementById("songTitle").innerText = song.title;
        document.getElementById("songArtist").innerText = song.artist;
        document.getElementById("songChords").innerHTML = formatChordsAndLyrics(song.chords);
        
        document.getElementById("mainInterface").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        document.getElementById("scrollControls").style.display = "flex";
        window.scrollTo(0, 0); 
    }

    function closeSong() {
        stopAutoscroll();
        currentSong = null;
        document.getElementById("resultArea").style.display = "none";
        document.getElementById("scrollControls").style.display = "none";
        document.getElementById("mainInterface").style.display = "block";
        window.scrollTo(0, 0);
    }

    function changeFontSize(step) {
        currentFontSize += step;
        if (currentFontSize < 12) currentFontSize = 12;
        if (currentFontSize > 36) currentFontSize = 36;
        document.getElementById("songChords").style.fontSize = currentFontSize + "px";
    }

    function toggleDarkMode() {
        document.body.classList.toggle("dark-mode");
    }

    function changeSpeed(step) {
        currentSpeedIndex += step;
        if (currentSpeedIndex < 0) currentSpeedIndex = 0;
        if (currentSpeedIndex >= speedsArray.length) currentSpeedIndex = speedsArray.length - 1;
        document.getElementById("speedLabel").innerText = "Spd " + (5 - currentSpeedIndex);
        if (isScrolling) { stopAutoscroll(); startAutoscroll(); }
    }

    function toggleAutoscroll() { isScrolling ? stopAutoscroll() : startAutoscroll(); }
    function startAutoscroll() { isScrolling = true; document.getElementById("autoscrollBtn").innerText = "⏸️"; scrollInterval = setInterval(() => { window.scrollBy(0, 1); }, speedsArray[currentSpeedIndex]); }
    function stopAutoscroll() { isScrolling = false; document.getElementById("autoscrollBtn").innerText = "▶️"; clearInterval(scrollInterval); }

    function saveToPlaylist() {
        if (!currentSong) return;
        let playlistName = prompt("Enter Playlist name:", "Favorites");
        if (!playlistName) return; 
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        if (!allPlaylists[playlistName]) allPlaylists[playlistName] = [];
        if (!allPlaylists[playlistName].some(song => song.title === currentSong.title)) {
            allPlaylists[playlistName].push(currentSong);
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            alert("Saved!"); displayPlaylists(); 
        } else { alert("Already in this playlist!"); }
    }

    function deleteSong(playlistName, songTitle) {
        if (confirm("Remove from playlist?")) {
            let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
            allPlaylists[playlistName] = allPlaylists[playlistName].filter(song => song.title !== songTitle);
            if (allPlaylists[playlistName].length === 0) delete allPlaylists[playlistName];
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            displayPlaylists(); 
        }
    }

    function displayPlaylists() {
        const playlistsArea = document.getElementById("playlistsArea");
        playlistsArea.innerHTML = "";
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        const playlistNames = Object.keys(allPlaylists);

        // NOVO: Mostrar também as músicas adicionadas pelo usuário na tela inicial
        let customSongs = JSON.parse(localStorage.getItem("myCustomSongs")) || [];
        if (customSongs.length > 0) {
            const groupDiv = document.createElement("div");
            groupDiv.className = "playlist-group";
            groupDiv.innerHTML = `<h4 class="playlist-title" style="background:#34C759; color:white;">🎸 Added by Me</h4>`;
            customSongs.forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                songDiv.innerHTML = `<div class="song-info" onclick='openSongOnScreen(${JSON.stringify(song)})'><strong>${song.title}</strong><br><small style="color:gray;">${song.artist}</small></div>`;
                groupDiv.appendChild(songDiv);
            });
            playlistsArea.appendChild(groupDiv);
        }

        if (playlistNames.length === 0 && customSongs.length === 0) { 
            playlistsArea.innerHTML = "<p style='color: gray; text-align: center;'>Your library is empty.</p>"; 
            return; 
        }

        playlistNames.forEach(name => {
            const groupDiv = document.createElement("div");
            groupDiv.className = "playlist-group";
            groupDiv.innerHTML = `<h4 class="playlist-title">📁 ${name}</h4>`;
            allPlaylists[name].forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                songDiv.innerHTML = `<div class="song-info" onclick='openSongOnScreen(${JSON.stringify(song)})'><strong>${song.title}</strong><br><small style="color:gray;">${song.artist}</small></div><button class="delete-btn" onclick="deleteSong('${name}', '${song.title}')">🗑️</button>`;
                groupDiv.appendChild(songDiv);
            });
            playlistsArea.appendChild(groupDiv);
        });
    }

</script>

</body>
</html>
