<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.jpg">
    <link rel="manifest" href="manifest.json">

    <title>Chord Finder</title>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; padding: 0; background-color: #f2f2f7; color: #333; transition: background-color 0.3s; }
        
        /* Menu Principal */
        .header { background: white; padding: 20px 20px 10px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 1px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-size: 22px; }
        .icon-btn { background: none; border: none; font-size: 24px; cursor: pointer; padding: 5px; }

        .app-container { padding: 20px; padding-bottom: 100px; }
        
        #searchSection { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: none; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; box-sizing: border-box; }
        .btn-primary { width: 100%; background-color: #007AFF; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Playlists */
        .playlist-group { background: white; border-radius: 12px; margin-bottom: 15px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .playlist-title { background: #e5e5ea; padding: 10px 15px; margin: 0; font-size: 16px; font-weight: bold; color: #007AFF; }
        .song-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-bottom: 1px solid #f2f2f7; font-size: 15px; }
        .song-info { flex-grow: 1; cursor: pointer; }
        .delete-btn { background: none; border: none; color: #FF3B30; font-size: 18px; cursor: pointer; padding: 5px 0 5px 15px; }

        /* Tela de Música (Tela Cheia) */
        #resultArea { display: none; background: white; min-height: 100vh; padding: 30px 20px 120px 20px; box-sizing: border-box; }
        .chord-box { font-family: monospace; white-space: pre-wrap; margin: 20px 0; font-size: 16px; line-height: 1.5; color: #111; }
        .controls-row { display: flex; gap: 10px; margin-top: 20px; margin-bottom: 10px; }
        
        /* NOVO: Painel Flutuante de Velocidade */
        .scroll-controls { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; border-radius: 40px; display: none; align-items: center; gap: 15px; padding: 12px 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.4); z-index: 1000; }
        .scroll-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 0 5px; }
        .speed-label { font-size: 16px; font-weight: bold; width: 50px; text-align: center; }
        .play-btn { color: #FF9500; font-size: 28px; margin-left: 10px; }
    </style>
</head>
<body>

<div id="mainInterface">
    <div class="header">
        <h2>🎸 Chords</h2>
        <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    </div>

    <div class="app-container">
        <div id="searchSection">
            <input type="text" id="searchInput" placeholder="Nome da música (ex: Tempo Perdido)">
            <button class="btn-primary" onclick="searchSong()">Buscar Música</button>
        </div>

        <h3 style="margin-top: 0;">Minhas Playlists</h3>
        <div id="playlistsArea"></div>
    </div>
</div>

<div id="resultArea">
    <h2 id="songTitle" style="margin-top: 0; font-size: 28px;"></h2>
    <p id="songArtist" style="color: gray; margin: 0; font-size: 18px;"></p>
    
    <div class="controls-row">
        <button class="btn-primary" style="background-color: #FF3B30; flex: 1;" onclick="closeSong()">⬅️ Voltar</button>
        <button class="btn-primary" style="background-color: #34C759; flex: 1;" onclick="saveToPlaylist()">➕ Playlist</button>
    </div>

    <div id="songChords" class="chord-box"></div>
</div>

<div id="scrollControls" class="scroll-controls">
    <button class="scroll-btn" onclick="changeSpeed(1)">➖</button>
    <span id="speedLabel" class="speed-label">Vel 3</span>
    <button class="scroll-btn" onclick="changeSpeed(-1)">➕</button>
    <button id="autoscrollBtn" class="scroll-btn play-btn" onclick="toggleAutoscroll()">▶️</button>
</div>

<script>
    const songDatabase = [
        { title: "Wonderwall", artist: "Oasis", chords: "[Em] Today is [G] gonna be the day\nThat they're [D] gonna throw it back to [A7sus4] you\nBy [Em] now you should've [G] somehow\nRealized what you [D] gotta do\nI don't be[Em]lieve that any[G]body\nFeels the [D] way I do, about you [A7sus4] now\n\n(E repete para testar a rolagem...)\n[Em] Today is [G] gonna be the day\nThat they're [D] gonna throw it back to [A7sus4] you\nBy [Em] now you should've [G] somehow\nRealized what you [D] gotta do\nI don't be[Em]lieve that any[G]body\nFeels the [D] way I do, about you [A7sus4] now" },
        { title: "Let It Be", artist: "The Beatles", chords: "When I [C] find myself in [G] times of trouble\n[Am] Mother Mary [F] comes to me\nSpeaking [C] words of wisdom, [G] let it be [F] [C]\n\nAnd in my [C] hour of [G] darkness\nShe is [Am] standing right in [F] front of me\nSpeaking [C] words of wisdom, [G] let it be [F] [C]" },
        { title: "Tempo Perdido", artist: "Legião Urbana", chords: "Todos os [C] dias quando a[Am]cordo\nNão tenho mais o [Bm] tempo que pas[Em]sou\nMas tenho [C] muito tempo\nTemos todo o [Am] tempo do mun[Bm]do [Em]" },
        { title: "Aleluia", artist: "Gabriela Rocha", chords: "Pai eu [C] quero te a[Am]mar\nTocar o [C] teu cora[Am]ção\nE me derra[F]mar aos teus [G] pés [C] [G]\nMais perto [C] eu quero es[F]tar [G]" }
    ];

    let currentSong = null;

    // Variáveis de Controle de Velocidade
    let isScrolling = false;
    let scrollInterval = null;
    
    // Lista de velocidades (em milissegundos). Menor o número = Mais Rápido.
    // Vel 1 (Muito Lento) até Vel 5 (Muito Rápido)
    const speedsArray = [120, 80, 50, 30, 15]; 
    let currentSpeedIndex = 2; // Começa no índice 2 (Velocidade 3 - 50ms)

    function toggleSearch() {
        const searchDiv = document.getElementById("searchSection");
        if (searchDiv.style.display === "none" || searchDiv.style.display === "") {
            searchDiv.style.display = "block";
            document.getElementById("searchInput").focus();
        } else {
            searchDiv.style.display = "none";
        }
    }

    function searchSong() {
        const query = document.getElementById("searchInput").value.toLowerCase();
        const result = songDatabase.find(song => 
            song.title.toLowerCase().includes(query) || 
            song.artist.toLowerCase().includes(query)
        );

        if (result) {
            openSongOnScreen(result);
            document.getElementById("searchSection").style.display = "none";
            document.getElementById("searchInput").value = ""; 
        } else {
            alert("Música não encontrada no banco de dados.");
        }
    }

    function openSongOnScreen(song) {
        currentSong = song;
        document.getElementById("songTitle").innerText = song.title;
        document.getElementById("songArtist").innerText = song.artist;
        document.getElementById("songChords").innerText = song.chords;
        
        document.getElementById("mainInterface").style.display = "none";
        document.getElementById("resultArea").style.display = "block";
        
        // Mostra o painel de rolagem
        document.getElementById("scrollControls").style.display = "flex";
        document.body.style.backgroundColor = "white";
        window.scrollTo(0, 0); 
    }

    function closeSong() {
        stopAutoscroll();
        currentSong = null;
        
        document.getElementById("resultArea").style.display = "none";
        document.getElementById("scrollControls").style.display = "none";
        document.getElementById("mainInterface").style.display = "block";
        document.body.style.backgroundColor = "#f2f2f7";
        window.scrollTo(0, 0);
    }

    // --- FUNÇÕES DA NOVA BARRA DE VELOCIDADE ---
    function changeSpeed(step) {
        // Altera a velocidade (-1 para mais rápido, +1 para mais devagar)
        currentSpeedIndex += step;
        
        // Impede que passe dos limites (Vel 1 até Vel 5)
        if (currentSpeedIndex < 0) currentSpeedIndex = 0;
        if (currentSpeedIndex >= speedsArray.length) currentSpeedIndex = speedsArray.length - 1;

        // Atualiza o texto na tela (Índice 0 = Vel 5, Índice 4 = Vel 1)
        // A lógica do texto foi invertida para que o "+" sempre signifique mais rápido para o usuário.
        let displaySpeed = 5 - currentSpeedIndex; 
        document.getElementById("speedLabel").innerText = "Vel " + displaySpeed;

        // Se a rolagem já estiver ligada, reinicia ela com a nova velocidade na mesma hora
        if (isScrolling) {
            stopAutoscroll();
            startAutoscroll();
        }
    }

    function toggleAutoscroll() {
        if (isScrolling) {
            stopAutoscroll();
        } else {
            startAutoscroll();
        }
    }

    function startAutoscroll() {
        isScrolling = true;
        document.getElementById("autoscrollBtn").innerText = "⏸️"; 
        
        let currentMs = speedsArray[currentSpeedIndex];
        scrollInterval = setInterval(() => {
            window.scrollBy(0, 1);
        }, currentMs); 
    }

    function stopAutoscroll() {
        isScrolling = false;
        document.getElementById("autoscrollBtn").innerText = "▶️"; 
        clearInterval(scrollInterval);
    }
    // ---------------------------------------------

    function saveToPlaylist() {
        if (!currentSong) return;
        let playlistName = prompt("Digite o nome da Playlist:", "Favoritas");
        if (!playlistName) return; 

        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        if (!allPlaylists[playlistName]) allPlaylists[playlistName] = [];

        const alreadySaved = allPlaylists[playlistName].some(song => song.title === currentSong.title);
        if (!alreadySaved) {
            allPlaylists[playlistName].push(currentSong);
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            alert("Salvo na playlist: " + playlistName);
            displayPlaylists(); 
        } else {
            alert("Essa música já está na playlist " + playlistName);
        }
    }

    function deleteSong(playlistName, songTitle) {
        if (confirm("Remover '" + songTitle + "' da playlist?")) {
            let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
            allPlaylists[playlistName] = allPlaylists[playlistName].filter(song => song.title !== songTitle);
            if (allPlaylists[playlistName].length === 0) delete allPlaylists[playlistName];
            localStorage.setItem("allPlaylists", JSON.stringify(allPlaylists));
            displayPlaylists(); 
        }
    }

    function displayPlaylists() {
        const playlistsArea = document.getElementById("playlistsArea");
        playlistsArea.innerHTML = "";
        
        let allPlaylists = JSON.parse(localStorage.getItem("allPlaylists")) || {};
        const playlistNames = Object.keys(allPlaylists);

        if (playlistNames.length === 0) {
            playlistsArea.innerHTML = "<p style='color: gray; text-align: center; margin-top: 40px;'>Nenhuma música salva ainda.<br>Clique na lupa 🔍 para buscar!</p>";
            return;
        }

        playlistNames.forEach(name => {
            const groupDiv = document.createElement("div");
            groupDiv.className = "playlist-group";
            groupDiv.innerHTML = `<h4 class="playlist-title">📁 ${name}</h4>`;
            
            allPlaylists[name].forEach(song => {
                const songDiv = document.createElement("div");
                songDiv.className = "song-item";
                songDiv.innerHTML = `
                    <div class="song-info" onclick='openSongOnScreen(${JSON.stringify(song)})'>
                        <strong>${song.title}</strong> <br>
                        <small style="color:gray;">${song.artist}</small>
                    </div>
                    <button class="delete-btn" onclick="deleteSong('${name}', '${song.title}')">🗑️</button>
                `;
                groupDiv.appendChild(songDiv);
            });
            playlistsArea.appendChild(groupDiv);
        });
    }

    displayPlaylists();
</script>

</body>
</html>
